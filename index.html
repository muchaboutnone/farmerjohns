<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Farmer Johns Organics</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    body, html {
      height: 100%;
      background: linear-gradient(135deg, #a8e6cf, #dcedc1);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #2e2e2e;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #3a5a40;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .logo {
      width: 120px;
      margin-bottom: 1rem;
    }

    .subscribe input[type="email"] {
      padding: 0.8rem 1rem;
      border-radius: 30px;
      border: 1px solid #ccc;
      width: 70%;
      max-width: 300px;
      margin-right: 0.5rem;
    }

    .subscribe button {
      padding: 0.8rem 1.2rem;
      border-radius: 30px;
      border: none;
      background: #3a5a40;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .subscribe button:hover {
      background: #2e4532;
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #555;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p>Farmer John Organics</p>
    <h1>We’re Growing Something New!</h1>
    <p>Our website is under construction. Stay tuned for updates and fresh content coming soon!</p>

    <footer>
      &copy; 2026 Farmer Johns Organics. All rights reserved.
    </footer>
  </div>
</body>
</html>
